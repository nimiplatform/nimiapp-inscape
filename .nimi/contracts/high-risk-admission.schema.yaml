version: 1
truth_contract:
  id: local_high_risk_admission_evidence
top_level_required_keys:
  - admissions
  - admission_rules
  - semantic_constraints
admission_required_fields:
  - topic_id
  - packet_id
  - disposition
  - admitted_at
  - manager_review_owner
  - summary
  - source_decision_contract
disposition_enum:
  - complete
  - partial
  - deferred
semantic_constraints:
  - local_admission_records_must_not_promote_operational_runtime_state
  - local_admission_records_must_not_be_used_as_product_authority
  - local_admission_records_must_use_iso_8601_utc_admitted_at
